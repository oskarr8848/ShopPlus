    <path d="M91 162V91H123C140 91 153 95 162 103C172 111 177 123 177 137C177 151 172 162 162 170C153 178 140 182 123 182H91V162ZM118 118V155H123C138 155 146 149 146 137C146 125 138 118 123 118H118Z" fill="#111827"/>
