<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShopPlus GUI plus Merra banner</title>
  <desc id="desc">A premium Minecraft economy plugin banner for ShopPlus and Merra.</desc>
  <defs>
